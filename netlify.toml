# Netlify 빌드 및 호스팅 설정
[build]
  publish = "static"  # 사용자 브라우저에 서비스할 정적 파일 폴더

# CORS 에러 방지 및 파이썬 백엔드(FastAPI) 연동을 위한 Proxy 설정
[[redirects]]
  from = "/api/*"
  # TODO: Render나 외부 플랫폼에 파이썬 백엔드를 배포한 후, 아래 주소의 "your-backend-url" 부분을 실제 백엔드 URL로 변경하세요.
  to = "https://your-backend-url.onrender.com/api/:splat"
  status = 200
  force = true
